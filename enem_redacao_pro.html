<!DOCTYPE html>
<html>
<head>
  <title>ENEM Redação Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    button { padding: 10px; margin: 5px; border: none; border-radius: 8px; background: #22c55e; color: white; }
    textarea { width: 100%; height: 200px; border-radius: 10px; padding: 10px; }
    .box { margin-top: 20px; padding: 15px; background: #1e293b; border-radius: 10px; }
  </style>
</head>

<body>

<h1>📱 ENEM Redação Pro</h1>

<button onclick="gerarTema()">Gerar Tema</button>
<p id="tema"></p>

<div class="box">
<h3>✍️ Escreva sua redação</h3>
<textarea placeholder="Comece sua redação aqui..."></textarea>
</div>

<div class="box">
<h3>🧠 Estrutura</h3>
<p>Introdução → Tese</p>
<p>Desenvolvimento → Argumentos</p>
<p>Conclusão → Proposta de intervenção</p>
</div>

<div class="box">
<h3>✔ Checklist</h3>
<ul>
<li>Tema abordado</li>
<li>Tese clara</li>
<li>2 argumentos</li>
<li>Proposta completa</li>
</ul>
</div>

<script>
function gerarTema() {
  const temas = [
    "Saúde mental no Brasil",
    "Impacto das redes sociais",
    "Desigualdade social",
    "Educação no Brasil",
    "Violência urbana"
  ];
  const tema = temas[Math.floor(Math.random() * temas.length)];
  document.getElementById("tema").innerText = "Tema: " + tema;
}
</script>

</body>
</html>
